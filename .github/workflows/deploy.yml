name: Deploy to Fly.io

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite lanzar el deploy manualmente desde GitHub UI

jobs:
  deploy:
    name: Deploy azuracast-mcp-fly
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
